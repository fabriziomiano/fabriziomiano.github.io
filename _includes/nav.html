<header class="site-header" data-site-header>
  <a class="brand" href="{{ '/' | relative_url }}" aria-label="Fabrizio Miano home">
    <img src="{{ '/assets/img/logo.svg' | relative_url }}" alt="" />
    <span>Fabrizio Miano</span>
  </a>
  <button class="nav-toggle" type="button" aria-label="{{ page.nav_open_label | default: 'Open navigation' }}" data-open-label="{{ page.nav_open_label | default: 'Open navigation' }}" data-close-label="{{ page.nav_close_label | default: 'Close navigation' }}" aria-expanded="false" data-nav-toggle>
    <i class="bi bi-list"></i>
  </button>
  <nav class="site-nav" data-site-nav aria-label="{{ page.nav_label | default: 'Primary navigation' }}">
    <a href="#about">{{ page.nav_about | default: 'About' }}</a>
    <a href="#story">{{ page.nav_story | default: 'Story' }}</a>
    <a href="#work">{{ page.nav_work | default: 'Work' }}</a>
    <a href="#talks">{{ page.nav_talks | default: 'Talks' }}</a>
    <a href="#contact">{{ page.nav_contact | default: 'Contact' }}</a>
  </nav>
  <nav class="language-switcher" aria-label="{{ page.language_label | default: 'Language selector' }}">
    <a{% if page.lang == 'en' %} class="active"{% endif %} href="{{ '/' | relative_url }}" hreflang="en">EN</a>
    <a{% if page.lang == 'it' %} class="active"{% endif %} href="{{ '/it/' | relative_url }}" hreflang="it">IT</a>
    <a{% if page.lang == 'scn' %} class="active"{% endif %} href="{{ '/scn/' | relative_url }}" hreflang="scn">SCN</a>
  </nav>
</header>
